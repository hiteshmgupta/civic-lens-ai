services:
  - type: web
    name: civiclens-ai
    runtime: python
    plan: free
    rootDir: civiclens-ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ai/health
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
