spring:
  datasource:
    url: jdbc:h2:mem:civiclens_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: test-secret-key-for-unit-testing-minimum-256-bits-long-enough
    expiration-ms: 86400000
  ai:
    service-url: http://localhost:9999
