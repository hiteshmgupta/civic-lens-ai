server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://dpg-d6nc8675r7bs73cugnu0-a.singapore-postgres.render.com/civiclens_db_lrtg}
    username: ${DB_USERNAME:civiclens_db_lrtg_user}
    password: ${DB_PASSWORD:nAbLmYtfIDHWhrQZKG3VE6gEbRTNYHdl}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:civiclens-default-secret-key-change-in-production-min-256-bits-long}
    expiration-ms: 86400000
  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8000}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

analytics:
  refresh:
    interval-ms: 180000
    initial-delay-ms: 45000
  backfill:
    enabled: false  # Disabled during startup to prevent blocking on Render; will run on schedule

logging:
  level:
    com.civiclens: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"