server:
  # Render dynamically assigns a PORT, defaulting to 8080 for local dev
  port: ${PORT:8080}

spring:
  datasource:
    # Removed hardcoded fallback credentials
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    # Removed fallback secret for security
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 hours
  
  # Added a variable for CORS to allow the frontend production URL
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

  # AI Service connection
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}