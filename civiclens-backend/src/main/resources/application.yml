server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://dpg-d6nc8675r7bs73cugnu0-a.singapore-postgres.render.com/civiclens_db_lrtg}
    username: ${DB_USERNAME:civiclens_db_lrtg_user}
    password: ${DB_PASSWORD:nAbLmYtfIDHWhrQZKG3VE6gEbRTNYHdl}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
